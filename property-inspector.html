<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="property-inspector.css">
    <script src="property-inspector.js"></script>
  </head>
  <body>
    <div class="sdpi-item single-target">
      <div class="sdpi-item-label">Target</div>
      <select id="targetRole" class="sdpi-item-value">
        <option value="master">Master</option>
        <option value="game">Game</option>
        <option value="chatRender">Chat</option>
        <option value="media">Media</option>
        <option value="aux">Aux</option>
        <option value="chatCapture">Microphone</option>
      </select>
    </div>
    <div class="sdpi-item block overview-targets">
      <div class="sdpi-item-label">Overview</div>
      <div class="sdpi-item-value checkbox-grid">
        <label><input type="checkbox" name="overviewTarget" value="master"> Master</label>
        <label><input type="checkbox" name="overviewTarget" value="game"> Game</label>
        <label><input type="checkbox" name="overviewTarget" value="chatRender"> Chat</label>
        <label><input type="checkbox" name="overviewTarget" value="media"> Media</label>
        <label><input type="checkbox" name="overviewTarget" value="aux"> Aux</label>
        <label><input type="checkbox" name="overviewTarget" value="chatCapture"> Microphone</label>
      </div>
    </div>
    <div class="sdpi-item chatmix-settings">
      <div class="sdpi-item-label">ChatMix</div>
      <select id="chatMixMode" class="sdpi-item-value">
        <option value="chat">Toward Chat</option>
        <option value="game">Toward Game</option>
        <option value="reset">Reset Center</option>
      </select>
    </div>
    <div class="sdpi-item chatmix-settings">
      <div class="sdpi-item-label">Mix step</div>
      <input id="chatMixStep" class="sdpi-item-value" type="number" min="1" max="100" value="10">
    </div>
    <div class="sdpi-item streammix-settings">
      <div class="sdpi-item-label">Stream mix</div>
      <select id="streamMix" class="sdpi-item-value">
        <option value="monitoring">Monitoring</option>
        <option value="streaming">Streaming</option>
      </select>
    </div>
    <div class="sdpi-item device-settings">
      <div class="sdpi-item-label">Device ID</div>
      <input id="deviceId" class="sdpi-item-value" placeholder="Sonar device id">
    </div>
    <div class="sdpi-item volume-settings">
      <div class="sdpi-item-label">Step</div>
      <input id="step" class="sdpi-item-value" type="number" min="1" max="20" value="2">
    </div>
    <div class="sdpi-item volume-settings">
      <div class="sdpi-item-label">Title label</div>
      <input id="titleLabel" class="sdpi-item-value" placeholder="optional display alias">
    </div>
    <div class="sdpi-item volume-settings">
      <div class="sdpi-item-label">Invert knob</div>
      <input id="invertKnob" class="sdpi-checkbox" type="checkbox">
    </div>
    <div class="sdpi-item diagnostics">
      <div class="sdpi-item-label">Diagnostics</div>
      <button id="refreshDiagnostics" class="sdpi-button" type="button">Refresh</button>
      <span id="status" class="sdpi-status">not checked</span>
    </div>
    <div class="sdpi-item block diagnostics">
      <div class="sdpi-item-label">Result</div>
      <pre id="diagnosticsOutput" class="sdpi-item-value textarea"></pre>
    </div>
  </body>
</html>
