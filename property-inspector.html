<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="property-inspector.css">
    <script src="property-inspector.js"></script>
  </head>
  <body>
    <div class="sdpi-item sonar-mode-settings">
      <div class="sdpi-item-label">Sonar mode</div>
      <select id="sonarMode" class="sdpi-item-value">
        <option value="normal">Normal</option>
        <option value="streamer">Streamer</option>
      </select>
    </div>
    <div class="sdpi-item single-target">
      <div class="sdpi-item-label">Target</div>
      <select id="targetRole" class="sdpi-item-value">
        <option value="master">Master</option>
        <option value="game">Game</option>
        <option value="chatRender">Chat</option>
        <option value="media">Media</option>
        <option value="aux">Aux</option>
        <option value="chatCapture">Microphone</option>
        <option value="all">All outputs</option>
      </select>
    </div>
    <div class="sdpi-item block overview-targets">
      <div class="sdpi-item-label">Overview</div>
      <div class="sdpi-item-value checkbox-grid">
        <label><input type="checkbox" name="overviewTarget" value="master"> Master</label>
        <label><input type="checkbox" name="overviewTarget" value="game"> Game</label>
        <label><input type="checkbox" name="overviewTarget" value="chatRender"> Chat</label>
        <label><input type="checkbox" name="overviewTarget" value="media"> Media</label>
        <label><input type="checkbox" name="overviewTarget" value="aux"> Aux</label>
        <label><input type="checkbox" name="overviewTarget" value="chatCapture"> Microphone</label>
      </div>
    </div>
    <div class="sdpi-item chatmix-settings">
      <div class="sdpi-item-label">ChatMix</div>
      <select id="chatMixMode" class="sdpi-item-value">
        <option value="chat">Toward Chat</option>
        <option value="game">Toward Game</option>
        <option value="reset">Reset Center</option>
      </select>
    </div>
    <div class="sdpi-item chatmix-settings">
      <div class="sdpi-item-label">Mix step</div>
      <input id="chatMixStep" class="sdpi-item-value" type="number" min="1" max="100" value="10">
    </div>
    <div class="sdpi-item streammix-settings">
      <div class="sdpi-item-label">Streamer mix</div>
      <select id="streamMix" class="sdpi-item-value">
        <option value="monitoring">Monitoring</option>
        <option value="streaming">Streaming</option>
      </select>
    </div>
    <div class="sdpi-item rotation-settings">
      <div class="sdpi-item-label">Rotation</div>
      <select id="rotationMode" class="sdpi-item-value">
        <option value="target">Selected target</option>
        <option value="all-auto-detect">All auto</option>
        <option value="all-classic">All classic</option>
        <option value="all-streaming">All stream</option>
      </select>
    </div>
    <div class="sdpi-item streamer-output-settings">
      <div class="sdpi-item-label">Output route</div>
      <select id="streamerOutput" class="sdpi-item-value">
        <option value="monitoring">All monitoring</option>
        <option value="streaming">All stream</option>
      </select>
    </div>
    <div class="sdpi-item rotation-mode-status">
      <div class="sdpi-item-label">Mode</div>
      <span id="modeStatus" class="sdpi-status">not checked</span>
    </div>
    <div class="sdpi-item rotation-mode-status">
      <div class="sdpi-item-label">Route</div>
      <span id="routeStatus" class="sdpi-status">not checked</span>
    </div>
    <div class="sdpi-item rotation-common-settings">
      <div class="sdpi-item-label">Excluded devices</div>
      <input id="allowExcludedDevices" class="sdpi-checkbox" type="checkbox">
    </div>
    <div class="sdpi-item rotation-common-settings">
      <div class="sdpi-item-label">Rotate ticks</div>
      <input id="rotateTicks" class="sdpi-item-value" type="number" min="1" max="20" value="3">
    </div>
    <div class="sdpi-item device-settings">
      <div class="sdpi-item-label">Device</div>
      <select id="deviceSelect" class="sdpi-item-value">
        <option value="">Load devices...</option>
      </select>
    </div>
    <div class="sdpi-item device-settings">
      <div class="sdpi-item-label">Device ID</div>
      <input id="deviceId" class="sdpi-item-value" placeholder="Sonar device id">
    </div>
    <div class="sdpi-item device-settings">
      <div class="sdpi-item-label">Devices</div>
      <button id="refreshDevices" class="sdpi-button" type="button">Refresh</button>
      <span id="deviceStatus" class="sdpi-status">not loaded</span>
    </div>
    <div class="sdpi-item profile-settings">
      <div class="sdpi-item-label">Profile</div>
      <select id="targetProfileId" class="sdpi-item-value">
        <option value="">Load profiles...</option>
      </select>
    </div>
    <div class="sdpi-item profile-settings">
      <div class="sdpi-item-label">Profiles</div>
      <button id="refreshProfiles" class="sdpi-button" type="button">Refresh</button>
      <span id="profileStatus" class="sdpi-status">not loaded</span>
    </div>
    <div class="sdpi-item volume-settings">
      <div class="sdpi-item-label">Step</div>
      <input id="step" class="sdpi-item-value" type="number" min="-20" max="20" value="2">
    </div>
    <div class="sdpi-item volume-settings">
      <div class="sdpi-item-label">Title label</div>
      <input id="titleLabel" class="sdpi-item-value" placeholder="optional display alias">
    </div>
    <div class="sdpi-item volume-settings">
      <div class="sdpi-item-label">Invert</div>
      <input id="invertKnob" class="sdpi-checkbox" type="checkbox">
    </div>
    <div class="sdpi-item diagnostics">
      <div class="sdpi-item-label">Diagnostics</div>
      <button id="refreshDiagnostics" class="sdpi-button" type="button">Refresh</button>
      <span id="status" class="sdpi-status">not checked</span>
    </div>
    <div class="sdpi-item block diagnostics">
      <div class="sdpi-item-label">Result</div>
      <pre id="diagnosticsOutput" class="sdpi-item-value textarea"></pre>
    </div>
  </body>
</html>
